services:
  nats-1:
    image: nats:latest
    container_name: nats-1
    command: >
      -c /etc/nats/nats.conf
      --server_name nats-1
      --cluster nats://0.0.0.0:6222
      --routes nats://nats-2:6222,nats://nats-3:6222
    ports:
      - "4222:4222"
      - "8222:8222"
      - "6222:6222"
    volumes:
      - ./nats.conf:/etc/nats/nats.conf:ro
      - nats1_data:/data
    restart: unless-stopped
    networks:
      - nats-network

  nats-2:
    image: nats:latest
    container_name: nats-2
    command: >
      -c /etc/nats/nats.conf
      --server_name nats-2
      --cluster nats://0.0.0.0:6222
      --routes nats://nats-1:6222,nats://nats-3:6222
    ports:
      - "4223:4222"
      - "8223:8222"
      - "6223:6222"
    volumes:
      - ./nats.conf:/etc/nats/nats.conf:ro
      - nats2_data:/data
    depends_on:
      - nats-1
    restart: unless-stopped
    networks:
      - nats-network

  nats-3:
    image: nats:latest
    container_name: nats-3
    command: >
      -c /etc/nats/nats.conf
      --server_name nats-3
      --cluster nats://0.0.0.0:6222
      --routes nats://nats-1:6222,nats://nats-2:6222
    ports:
      - "4224:4222"
      - "8224:8222"
      - "6224:6222"
    volumes:
      - ./nats.conf:/etc/nats/nats.conf:ro
      - nats3_data:/data
    depends_on:
      - nats-1
    restart: unless-stopped
    networks:
      - nats-network

  nats-box:
    image: natsio/nats-box:latest
    container_name: nats-box
    depends_on:
      - nats-1
      - nats-2
      - nats-3
    entrypoint: /bin/sh
    command: -lc "sleep infinity"
    restart: unless-stopped
    networks:
      - nats-network

volumes:
  nats1_data:
  nats2_data:
  nats3_data:

networks:
  nats-network:
    driver: bridge
